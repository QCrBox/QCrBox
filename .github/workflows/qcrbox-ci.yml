name: "QCrBox CI"

# Controls when the workflow will run
on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build_docs:
    runs-on: ubuntu-latest

    # Grant GITHUB_TOKEN the permissions required to make a Pages deployment
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source

    steps:
      # Checks out the  repository under $GITHUB_WORKSPACE, so the job can access it
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          pip install --upgrade uv
          uv pip install --system -r ./qcrbox/requirements-docs.txt
          uv pip install --system qcrbox@./qcrbox

      - name: Configure Git user
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: Extract branch name
        shell: bash
        run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
        id: extract_branch

      - name: Build and deploy with mike 🚀
        run: mike deploy --push ${{ steps.extract_branch.outputs.branch }}

#      - name: Create .tar.gz archive containing the docs build
