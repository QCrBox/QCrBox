  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Print ruff version
        uses: chartboost/ruff-action@v1
        with:
          args: --version
      - uses: chartboost/ruff-action@v1
        with:
          args: check --config qcrbox/pyproject.toml
      - uses: chartboost/ruff-action@v1
        with:
          args: format --diff --config qcrbox/pyproject.toml
